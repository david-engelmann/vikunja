server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        # Hard filter at Docker API level so we only discover this compose project.
        filters:
          - name: label
            values:
              - com.docker.compose.project=vikunja
    pipeline_stages:
      - docker: {}
    relabel_configs:
      # Safety filter: only keep known services from this stack.
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        regex: (vikunja|db|redis|cloudflared|prometheus|grafana|db-backup|git-backup|loki|promtail|init|prom-init)
        action: keep

      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        regex: vikunja
        action: keep

      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container

      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: compose_project

      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: compose_service

      - source_labels: [__meta_docker_container_label_com_docker_compose_container_number]
        target_label: compose_container_number

      - source_labels: [__meta_docker_container_image]
        target_label: image

      - source_labels: [__meta_docker_container_id]
        target_label: __path__
        replacement: /var/lib/docker/containers/$1/$1-json.log
